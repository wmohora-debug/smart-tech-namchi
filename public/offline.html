<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Offline | SMART TECH NAMCHI</title>
  <style>
    body {
      background-color: #030712;
      color: #ffffff;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
      padding: 24px;
      box-sizing: border-box;
      text-align: center;
    }
    .container {
      max-width: 480px;
      padding: 40px;
      border-radius: 24px;
      background: rgba(17, 24, 39, 0.7);
      backdrop-filter: blur(16px);
      border: 1px solid rgba(255, 255, 255, 0.08);
      box-shadow: 0 20px 50px -20px rgba(0, 0, 0, 0.7);
    }
    .logo {
      width: 64px;
      height: 64px;
      border-radius: 16px;
      background: linear-gradient(135deg, #0057FF, #00C2FF);
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 900;
      font-size: 32px;
      margin: 0 auto 24px;
      box-shadow: 0 0 20px rgba(0, 87, 255, 0.4);
    }
    h1 {
      font-size: 24px;
      margin: 0 0 12px;
      font-weight: 800;
      letter-spacing: -0.5px;
    }
    p {
      font-size: 14px;
      color: #9ca3af;
      line-height: 1.6;
      margin: 0 0 32px;
    }
    .contact-card {
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(255, 255, 255, 0.05);
      border-radius: 16px;
      padding: 20px;
      margin-bottom: 24px;
      text-align: left;
    }
    .contact-title {
      font-size: 11px;
      font-weight: 700;
      color: #00C2FF;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 8px;
    }
    .contact-info {
      font-size: 14px;
      color: #e5e7eb;
      margin-bottom: 12px;
      line-height: 1.4;
    }
    .contact-info:last-child {
      margin-bottom: 0;
    }
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      padding: 14px;
      border-radius: 12px;
      background: #0057FF;
      color: #white;
      font-weight: 600;
      font-size: 14px;
      text-decoration: none;
      transition: background 0.2s;
    }
    .btn:hover {
      background: #0046cc;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">S</div>
    <h1>You are offline</h1>
    <p>We can't load the website right now because you are disconnected from the internet. However, you can still reach us directly:</p>
    
    <div class="contact-card">
      <div class="contact-title">Visit Shop</div>
      <div class="contact-info">Melli Road, Near District Court, Namchi, South Sikkim 737126</div>
      
      <hr style="border: 0; border-top: 1px solid rgba(255,255,255,0.05); margin: 16px 0;">
      
      <div class="contact-title">Phone Call</div>
      <div class="contact-info"><a href="tel:+917719330915" style="color: #ffffff; text-decoration: none; font-weight: 600;">+91 77193 30915</a></div>
    </div>

    <a href="/" class="btn">Try Reconnecting</a>
  </div>
</body>
</html>
